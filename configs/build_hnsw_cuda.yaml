# Example configuration for src/retrieval/build_hnsw.py

# Data
dataset_path: omarkamali/wikipedia-monthly
dataset_name: latest.en             # local HF dataset directory or hub ID
split: train
output_dir: data/index/wiki_hnsw    # where index.bin, metadata.jsonl, manifest.json are written
min_paragraph_size: 40
max_paragraph_size: 1200
max_articles_to_process: null

# Embedding model
model: google/embeddinggemma-300m
model_device: cuda
multiprocessing: true
batch_size: 128
access_config: configs/access.yaml

# HNSW parameters
initial_index_size: 100000
ef_construction: 200
m: 16
ef_search: 64
num_threads: 8

