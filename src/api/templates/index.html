<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RAG Search</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; max-width: 960px; }
    textarea { width: 100%; height: 90px; }
    .para { border-left: 4px solid #ddd; padding-left: 0.75rem; margin: 0.5rem 0; }
    .score { color: #888; font-size: 0.9em; }
  </style>
</head>
<body>
  <h2>RAG Search</h2>
  <form method="post">
    <textarea name="q" placeholder="Ask a question...">{{ q }}</textarea><br/>
    <button type="submit">Search</button>
  </form>
  {% if answer %}
    <h3>Answer</h3>
    <div>{{ answer }}</div>
    <h3>Used paragraphs</h3>
    {% for r in rows %}
      <div class="para">
        <div class="score">score: {{ "%.4f"|format(r.score) }} | {{ r.title }} | <a href="{{ r.url }}" target="_blank">link</a></div>
        <div>{{ r.paragraph }}</div>
      </div>
    {% endfor %}
  {% endif %}
</body>
</html>
